name: Download Typhoon CSV

on:
  schedule:
    # Run every 15 minutes to catch data published with delay
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download missing CSV files
        run: |
          mkdir -p data
          MODELS="FNV3 GENC"
          TYPES="ensemble ensemble_mean"

          # Check last 2 days (today and yesterday) for missing data
          for offset in 0 1; do
            DATE=$(date -u -d "${offset} days ago" +%Y_%m_%d)
            for hour in 00 06 12 18; do
              TIMESTAMP="${DATE}T${hour}_00"
              for model in $MODELS; do
                for dtype in $TYPES; do
                  FILE="data/${model}_${dtype}_${TIMESTAMP}_paired.csv"
                  # Skip if already exists and large enough
                  if [ -f "$FILE" ]; then
                    SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
                    if [ "$SIZE" -ge 1000 ]; then
                      echo "Exists: $FILE (${SIZE} bytes)"
                      continue
                    fi
                    echo "Too small, re-download: $FILE"
                    rm -f "$FILE"
                  fi

                  URL="https://deepmind.google.com/science/weatherlab/download/cyclones/${model}/${dtype}/paired/csv/${model}_${TIMESTAMP}_paired.csv"
                  echo "Downloading $URL"
                  HTTP_CODE=$(curl -sL -o "$FILE" -w "%{http_code}" -H "User-Agent: Mozilla/5.0" "$URL" || true)
                  SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo 0)
                  if [ "$SIZE" -lt 1000 ] || [ "$HTTP_CODE" != "200" ]; then
                    echo "  Not available yet (HTTP $HTTP_CODE, size $SIZE)"
                    rm -f "$FILE"
                  else
                    echo "  Downloaded: $FILE (${SIZE} bytes)"
                  fi
                done
              done
            done
          done

      - name: Clean old files (keep 15 days)
        run: |
          find data/ -name "*.csv" -mtime +15 -delete 2>/dev/null || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            git commit -m "Auto-update typhoon CSV data $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
